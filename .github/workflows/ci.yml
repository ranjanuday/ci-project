name: Security Scan (Bandit)

on:
  push:

jobs:
  bandit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit Scan
        run: bandit app.py db.py templates/ -r -f txt
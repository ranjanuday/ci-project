name: ISRM CI Security Pipeline

on:
  push:
  pull_request:

jobs:
  test-and-security-scan:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_HOST: 127.0.0.1
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: student_db_secure
      SECRET_KEY: ci-secret-key
      RATE_LIMIT_ENABLED: "False"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Initialize MySQL schema
        run: mysql -h 127.0.0.1 -uroot -proot < setup_database.sql

      - name: Run automated tests
        run: python -m pytest -q

      - name: Run Bandit SAST scan
        run: python -m bandit -r app.py db.py -ll -f json -o bandit-report.json

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
